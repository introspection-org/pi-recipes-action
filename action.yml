name: Pi Recipes Check
description: Validate a Pi recipe with the pi-recipes checker.
author: Introspection
branding:
  icon: check-circle
  color: blue
inputs:
  recipe-dir:
    description: Path to the recipe directory to validate.
    required: false
    default: "."
  profile:
    description: "Validation profile: local, ci, or publish."
    required: false
    default: "ci"
  version:
    description: "Version of @introspection-ai/pi-recipes to run (latest = always newest)."
    required: false
    default: "latest"
  node-version:
    description: Node.js version used to run the checker.
    required: false
    default: "24"
  upload-report:
    description: Upload the JSON diagnostics report as a build artifact.
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Run recipe check
      shell: bash
      env:
        PI_RECIPES_VERSION: ${{ inputs.version }}
        RECIPE_DIR: ${{ inputs.recipe-dir }}
        PROFILE: ${{ inputs.profile }}
      run: |
        resolved="$(npm view "@introspection-ai/pi-recipes@${PI_RECIPES_VERSION}" version 2>/dev/null || echo "${PI_RECIPES_VERSION}")"
        echo "Using @introspection-ai/pi-recipes@${resolved}"
        # Produce the machine-readable report; report.js is the gate, so never
        # fail this step here (the redirect always writes the file, even on a
        # non-zero exit).
        npx -y -p "@introspection-ai/pi-recipes@${PI_RECIPES_VERSION}" recipes check "${RECIPE_DIR}" --profile "${PROFILE}" --json > "${RUNNER_TEMP}/recipe-check-report.json" || true
        cp "${RUNNER_TEMP}/recipe-check-report.json" recipe-check-report.json || true

    - name: Annotate and summarize
      shell: bash
      env:
        RECIPE_DIR: ${{ inputs.recipe-dir }}
      # Emits inline annotations + a job-summary table and exits non-zero when
      # the recipe is invalid, which fails the composite action.
      run: node "${GITHUB_ACTION_PATH}/report.js" "${RUNNER_TEMP}/recipe-check-report.json"

    - name: Compute report artifact name
      if: ${{ always() && inputs.upload-report == 'true' }}
      id: report
      shell: bash
      run: |
        slug=$(printf '%s' "${{ inputs.recipe-dir }}" | tr '/.' '--' | sed 's/^-*//; s/-*$//')
        echo "name=recipe-check-report${slug:+-$slug}" >> "$GITHUB_OUTPUT"

    - name: Upload recipe check report
      if: ${{ always() && inputs.upload-report == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.report.outputs.name }}
        path: recipe-check-report.json
        if-no-files-found: ignore
