# release-please drives versioning: on push to main it opens/updates a
# "Release PR" (Conventional Commits → version bump + CHANGELOG). Merging that
# PR cuts the vX.Y.Z tag + GitHub release, which flips `release_created` and
# runs the major-tag move below in the SAME workflow — a separate workflow
# listening on `release: published` would not fire, because GitHub does not
# re-trigger workflows for releases cut with the default GITHUB_TOKEN.
name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      # release-please-action still ships a Node 20 entrypoint; opt its JS
      # runtime into Node 24 to clear the deprecation warning.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      major: ${{ steps.rp.outputs.major }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          # Org policy can disable the built-in GITHUB_TOKEN from opening PRs.
          # A fine-grained PAT / App token (Contents + Pull requests: write) set
          # as RELEASE_PLEASE_TOKEN bypasses that; otherwise this falls back to
          # GITHUB_TOKEN (works when the org policy allows Actions to open PRs).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  tag-major:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move the major tag to this release
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
          MAJOR: v${{ needs.release-please.outputs.major }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR" "$TAG"
          git push origin "$MAJOR" --force
